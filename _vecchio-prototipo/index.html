       The CSS stack falls back through DM Serif Display / Cormorant if Agrandir isn't licensed. -->
  <style>
    @font-face {
      font-family: "Agrandir";
      src: local("Agrandir"), local("Agrandir Regular");
      font-display: swap;
    }

  <style>/* Movimento nel Bosco — base styles */

:root {
  /* Palette: white + viola/rosa */
  --bg: #ffffff;
  --bg-2: #f7f1f6;
  --surface: #ffffff;
  --ink: #3d2548;
  --ink-soft: #5a3d68;
  --ink-mute: #8a7593;
  --accent: #e8d5ec;
  --accent-2: #8a4ea3;
  --accent-3: #e8a5c4;
  --line: rgba(61, 37, 72, 0.18);
  --line-soft: rgba(61, 37, 72, 0.08);

  /* Type — Agrandir for headings (sans-serif geometric), Montserrat for body */
  --serif: "Agrandir", "Fraunces", "DM Serif Display", Georgia, serif;
  --sans: "Montserrat", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --mono: "Montserrat", ui-monospace, monospace;

  /* Spacing */
  --section-y: clamp(64px, 8vw, 140px);
  --container: 1240px;
  --gutter: clamp(20px, 4vw, 48px);
  --radius-pill: 999px;

  /* Shape: floral blob mask used across image slots */
  --mask-floral: path('M 200,20 C 270,10 350,40 360,110 C 370,160 410,180 400,250 C 390,330 320,360 250,360 C 200,360 170,395 110,380 C 40,365 10,300 30,230 C 45,180 10,150 30,90 C 55,25 130,30 200,20 Z');
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body[data-density="compact"] { --section-y: clamp(48px, 6vw, 96px); }

img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; cursor: pointer; }

.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 var(--gutter);
}

.serif {
  font-family: var(--serif);
  font-weight: 400;
  font-style: normal;
  letter-spacing: -0.01em;
}

.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

/* Dingbat ornament */
.ornament {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--ink);
  opacity: 0.8;
  font-style: normal;
}
.ornament::before { content: "✻"; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 28px;
  border-radius: var(--radius-pill);
  border: 1px solid var(--ink);
  background: transparent;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  transition: background 200ms ease, color 200ms ease, transform 150ms ease;
}
.btn:hover { background: var(--ink); color: var(--bg); }
.btn:active { transform: translateY(1px); }
.btn--filled { background: var(--ink); color: var(--bg); }
.btn--filled:hover { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
.btn--small { padding: 10px 20px; font-size: 10px; }

.btn .arrow { transition: transform 200ms ease; }
.btn:hover .arrow { transform: translateX(4px); }

/* Floral mask wrapper */
.floral-frame {
  position: relative;
  display: block;
  width: 100%;
  aspect-ratio: 1 / 1;
}
.floral-frame > * {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* Variants of the blob mask, all share the petal-ish silhouette */
.shape-floral { clip-path: url(#shape-floral); }
.shape-floral-2 { clip-path: url(#shape-floral-2); }
.shape-floral-3 { clip-path: url(#shape-floral-3); }
.shape-arch { clip-path: inset(0 round 50% 50% 8% 8% / 50% 50% 8% 8%); }
.shape-blob { clip-path: url(#shape-blob); }
.shape-circle { border-radius: 50%; }

/* Generic image-slot styling defaults inside this design */
image-slot {
  display: block;
  width: 100%;
  height: 100%;
  background: var(--bg-2);
  color: var(--ink-mute);
}

/* Section header pattern */
.section-head {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  text-align: center;
  margin-bottom: 56px;
}
.section-head h2 {
  font-family: var(--serif);
  font-style: normal;
  font-weight: 400;
  font-size: clamp(36px, 5vw, 64px);
  margin: 0;
  color: var(--ink);
  text-wrap: balance;
}
.section-head p {
  max-width: 620px;
  margin: 0;
  color: var(--ink-soft);
  font-size: 17px;
  line-height: 1.6;
  text-wrap: pretty;
}

/* Hover lift utility */
.lift { transition: transform 300ms cubic-bezier(.2,.8,.2,1); }
.lift:hover { transform: translateY(-4px); }

/* Marquee for tagline strip */
.marquee {
  overflow: hidden;
  background: var(--accent-2);
  color: #fff8ef;
  border-block: 1px solid rgba(0,0,0,0.08);
}
.marquee__track {
  display: flex;
  gap: 48px;
  padding: 18px 0;
  animation: marquee 32s linear infinite;
  white-space: nowrap;
  font-family: var(--serif);
  font-style: normal;
  font-size: 22px;
}
.marquee__track span { display: inline-flex; align-items: center; gap: 48px; }
.marquee__track span::after { content: "✻"; font-style: normal; opacity: 0.7; font-size: 14px; }
@keyframes marquee {
  to { transform: translateX(-50%); }
}

/* Form */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.field input, .field textarea, .field select {
  font: inherit;
  color: var(--ink);
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 10px 0;
  outline: none;
  transition: border-color 180ms;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--ink);
}
.field textarea { resize: vertical; min-height: 96px; font-family: var(--sans); }
.field--error input, .field--error textarea { border-color: var(--accent-2); }
.field__error {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--accent-2);
  margin-top: 2px;
}

/* Reveal animation */
.reveal { opacity: 0; transform: translateY(18px); transition: opacity 700ms ease, transform 700ms cubic-bezier(.2,.7,.2,1); }
.reveal.is-visible { opacity: 1; transform: none; }

/* Misc */
.divider {
  height: 1px;
  background: var(--line-soft);
  border: 0;
  margin: 0;
}

.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--line);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-soft);
}

/* Body emphasis */
strong, b {
  font-weight: 700;
  color: var(--ink);
}
@media (max-width: 860px) {
  .hide-mobile { display: none !important; }
}
</style>
  <style>/* Section-specific styles for Movimento nel Bosco */

/* ============ NAV ============ */
.nav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: color-mix(in oklab, var(--bg) 92%, transparent);
  backdrop-filter: blur(12px) saturate(140%);
  -webkit-backdrop-filter: blur(12px) saturate(140%);
  border-bottom: 1px solid var(--line-soft);
}
.nav__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 32px;
  padding-block: 18px;
}
.logo {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  color: var(--ink);
}
.logo__mark {
  font-size: 22px;
  display: inline-flex;
  width: 36px;
  height: 36px;
  align-items: center;
  justify-content: center;
  background: var(--ink);
  color: var(--bg);
  border-radius: 50%;
  font-style: normal;
}
.logo__words {
  display: flex;
  flex-direction: column;
  line-height: 1;
}
.logo__line {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.logo__line--italic {
  font-family: var(--serif);
  font-style: normal;
  font-size: 18px;
  letter-spacing: 0.01em;
  text-transform: none;
  margin-top: 2px;
}
.nav__links {
  display: flex;
  list-style: none;
  margin: 0;
  padding: 0;
  gap: 32px;
}
.nav__links a {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-soft);
  transition: color 200ms;
}
.nav__links a:hover { color: var(--ink); }

/* ============ HERO ============ */
.hero {
  padding: clamp(48px, 7vw, 96px) 0 clamp(32px, 5vw, 64px);
  position: relative;
  overflow: hidden;
}
.hero__inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(32px, 6vw, 80px);
  align-items: center;
}
.hero__copy {
  display: flex;
  flex-direction: column;
  gap: 24px;
}
.hero__copy h1 {
  font-family: var(--serif);
  font-style: normal;
  font-weight: 400;
  font-size: clamp(48px, 7vw, 96px);
  line-height: 1.02;
  margin: 0;
  text-wrap: balance;
}
.hero__copy p {
  margin: 0;
  font-size: 18px;
  line-height: 1.6;
  color: var(--ink-soft);
  max-width: 520px;
  text-wrap: pretty;
}
.hero__cta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.hero__chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 16px;
}

.hero__art {
  position: relative;
  aspect-ratio: 4/5;
  width: 100%;
}
.hero__shape {
  position: absolute;
  overflow: hidden;
}
.hero__shape--main {
  inset: 0;
  clip-path: url(#shape-floral);
  background: var(--accent);
}
.hero__shape--small {
  width: 36%;
  aspect-ratio: 1;
  right: -8%;
  bottom: 4%;
  border-radius: 50%;
  background: var(--accent-3);
  border: 6px solid var(--bg);
  overflow: hidden;
}
.hero__shape--small image-slot {
  border-radius: 50%;
}
.hero__leaf {
  position: absolute;
  top: -8%;
  right: 14%;
  font-size: 32px;
  color: var(--accent-2);
}
.hero__sticker {
  position: absolute;
  left: -10%;
  bottom: 10%;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: var(--ink);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: spin 22s linear infinite;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
}
.hero__sticker span {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 12px;
}
/* simple curved-text approximation: stack labels around using transform */
.hero__sticker { letter-spacing: 0.18em; }
.hero__sticker span:nth-child(1) { transform: rotate(0deg); }
.hero__sticker span:nth-child(2) { transform: rotate(45deg); }
.hero__sticker span:nth-child(3) { transform: rotate(90deg); }
.hero__sticker span:nth-child(4) { transform: rotate(135deg); }
.hero__sticker span:nth-child(5) { transform: rotate(180deg); }
.hero__sticker span:nth-child(6) { transform: rotate(225deg); }
.hero__sticker span:nth-child(7) { transform: rotate(270deg); }
.hero__sticker span:nth-child(8) { transform: rotate(315deg); }
.hero__sticker > span > * { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* simpler sticker — single rotating circle with one mantra */
.hero__sticker {

  font-style: normal;
  font-size: 11px;
  letter-spacing: 0.04em;
  text-transform: none;
}

  position: absolute;

  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  /* fallback: use text inside circle since SVG textPath would be heavier */
  white-space: pre;
  padding: 16px;
  text-align: center;
  font-family: var(--serif);
  font-style: normal;
}
.hero__sticker > span { display: none; }
